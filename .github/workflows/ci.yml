name: 'CI'

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Node setup
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm build:lib

      - name: Build playground
        run: pnpm build

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Node setup
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - run: pnpm install --frozen-lockfile

      - name: Test library
        run: pnpm test:lib:headless
